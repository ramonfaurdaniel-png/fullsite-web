<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
body{background:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Inter',sans-serif}
.card{width:1080px;height:1080px;background:#1a1a1a;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px}

.logo{font-size:32px;font-weight:800;color:#fff;letter-spacing:-0.03em;margin-bottom:56px}
.logo span{display:inline-block;width:10px;height:10px;background:#10b981;margin-left:2px;margin-bottom:2px}

.headline{font-size:56px;font-weight:800;color:#fff;text-align:center;letter-spacing:-0.04em;line-height:1.08;max-width:750px}
.green{color:#10b981}

.desc{font-size:20px;color:#666;text-align:center;margin-top:20px;max-width:500px;line-height:1.5}

.cta{margin-top:48px;background:#10b981;color:#fff;padding:20px 56px;border-radius:12px;font-size:20px;font-weight:700;letter-spacing:-0.02em}

.badges{display:flex;gap:20px;margin-top:32px}
.badge{display:flex;align-items:center;gap:6px;font-size:14px;color:#555}
.badge-check{color:#10b981;font-weight:700}

.bottom-bar{position:absolute;bottom:48px;left:56px;right:56px;display:flex;justify-content:space-between;align-items:center}
.bottom-url{font-size:16px;color:#444;font-weight:500}
.bottom-slide{font-size:12px;color:#333;font-weight:500}
</style>
</head>
<body>
<div class="card">
  <div class="logo">fullsite<span></span></div>

  <div class="headline">El futuro de tu restaurante <span class="green">empieza hoy.</span></div>
  <div class="desc">POS + 30 agentes de IA + Dashboard + Bot 24/7. Todo por $4,999/mes.</div>

  <div class="cta">Agendar demo gratis &rarr;</div>

  <div class="badges">
    <div class="badge"><span class="badge-check">&#x2713;</span> Setup en 7 dias</div>
    <div class="badge"><span class="badge-check">&#x2713;</span> Sin contrato anual</div>
    <div class="badge"><span class="badge-check">&#x2713;</span> Soporte WhatsApp</div>
  </div>

  <div class="bottom-bar">
    <div class="bottom-url">fullsite.mx</div>
    <div class="bottom-slide">5 / 5</div>
  </div>
</div>
</body>
</html>
