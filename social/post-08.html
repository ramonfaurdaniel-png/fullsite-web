<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0b;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.card{width:1080px;height:1080px;background:#0a0a0b;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px}
.card::before{content:'';position:absolute;top:35%;left:50%;transform:translateX(-50%);width:70%;height:60%;background:radial-gradient(ellipse,rgba(0,255,136,0.08) 0%,transparent 50%);pointer-events:none}
.logo{font-size:24px;font-weight:800;color:#fff;letter-spacing:-0.03em;position:absolute;top:60px;left:80px}
.logo span{display:inline-block;width:8px;height:8px;background:#00ff88;margin-left:2px;margin-bottom:2px}

.big-num{font-size:160px;font-weight:600;color:#00ff88;letter-spacing:-0.04em;line-height:0.9;text-align:center;text-shadow:0 0 80px rgba(0,255,136,0.3)}
.big-label{font-size:28px;color:rgba(255,255,255,0.4);text-align:center;margin-top:12px}

.stats{display:flex;gap:64px;margin-top:64px}
.stat{text-align:center}
.stat-num{font-size:48px;font-weight:600;color:#fff;letter-spacing:-0.03em}
.stat-label{font-size:15px;color:rgba(255,255,255,0.35);margin-top:6px}

.bottom{position:absolute;bottom:100px;font-size:18px;color:rgba(255,255,255,0.3);text-align:center;max-width:600px;line-height:1.5}

.tag{position:absolute;bottom:60px;left:80px;font-size:16px;color:rgba(255,255,255,0.3);letter-spacing:0.08em}
</style>
</head>
<body>
<div class="card">
  <div class="logo">fullsite<span></span></div>

  <div class="big-num">$70M+</div>
  <div class="big-label">MXN en ventas analizadas por nuestros agentes</div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num">181K+</div>
      <div class="stat-label">tickets procesados</div>
    </div>
    <div class="stat">
      <div class="stat-num">14</div>
      <div class="stat-label">agentes autonomos</div>
    </div>
    <div class="stat">
      <div class="stat-num">24/7</div>
      <div class="stat-label">sin parar</div>
    </div>
  </div>

  <div class="bottom">No es una demo. Es un sistema en produccion con datos reales.</div>

  <div class="tag">fullsite.mx</div>
</div>
</body>
</html>
